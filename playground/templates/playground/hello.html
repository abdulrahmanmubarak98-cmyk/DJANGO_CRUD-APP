<h2 class="mb-4"> Dashboard</h2>


{% extends "base.html" %}

{% block content %}

<h1>Welcome {{ request.user.username}} </h1>

{% if not notes %}
    <p class="text-muted">No notes yet. Start writing</p>
{% endif %}

<h3>Add Note</h3>

<div class="card p-3 mb-4 shadow-sm">
    <form method="POST" class="d-flex gap-2">

        {% csrf_token %}
        <input type="text" name="title" class="form-control" placeholder="Write a new note...">

        <button type="submit" class="btn btn-primary">Add</button>
    </form>
</div>


<h3 class="mb-4">Your Notes</h3>

<div class="row">
    {% for note in notes %}

    <div class="col-md-6 mb-3">
        <div class="card shaodow-sm p-3">

            <h5>{{ note.title }}</h5>

            <div class="mt-3 d-flex justify-content-end gap-2">
                <a href="{% url 'edit_note' note.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'delete_note' note.id %}" class="btn btn-danger btn-sm">Delete</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
