<h2 class="mb-4"> Dashboard</h2>


{% extends "base.html" %}

{% block content %}

<h1>Welcome {{ request.user.username}} </h1>

{% if not notes %}
    <p class="text-muted">No notes yet. Start writing</p>
{% endif %}

<h3>Add Note</h3>

<form method="POST">
    {% csrf_token %}

    <textarea name="content"
    placeholder="Write Your Note..."
    class="form-control mb-2"></textarea>

    <button type="submit" class="btn btn-primary">Add Note</button>
</form>


<h3 class="mb-4">Your Notes</h3>

<div class="row">
    {% for note in notes %}

    <div class="col-md-6 mb-3">
        <div class="card shaodow-sm p-3">

            <h5>{{ note.content }}</h5>

            <div class="mt-3 d-flex justify-content-end gap-2">
                <a href="{% url 'playground:edit_note' note.id %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'playground:delete_note' note.id %}" class="btn btn-danger btn-sm">Delete</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
