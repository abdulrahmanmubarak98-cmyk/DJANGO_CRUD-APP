{% extends "base.html" %}

{% block content %}

<h1>Welcome {{ request.user.username}} </h1>

<h3>Add Note</h3>

<div class="mb-4">

<form method="POST" class="d-flex gap-2">

        {% csrf_token %}

        <input type="text" name="title" class="form-control" placeholder="Enter Your Note">

        <button type="submit" class="btn btn-primary">Add</button>

</form>

</div>

<h3>Your Notes</h3>

<u1 class="list-group"></u1>

{% for note in notes %}
<div class="card p-2 mb-2">
    <div class="d-flex justify-content-between align-items-center">
        <span>{{ note.title}}</span>

        <div>
            <a href="{% url 'edit_note' note.id %}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{% url 'delete_note' note.id %}" class="btn btn-danger btn-sm">Delete</a>

        </div>

    </div>

</div>



    {% endfor %}


{% endblock %}
